# Hyprland Config (v0.54.0 - gsouza)

# -----------------------------------------------------
# MONITORS & VARIABLES
# -----------------------------------------------------
monitor= eDP-1, 1920x1080@60, 0x0, 1

$term    = kitty
$fileManager = thunar
$browser     = vivaldi
$browser-two = firefox
$mainMod     = SUPER
$scriptsDir  = ~/.config/hypr/scripts
$ipc = qs -c noctalia-shell ipc call

# -----------------------------------------------------
# ENVIRONMENT VARIABLES
# -----------------------------------------------------
env = LIBVA_DRIVER_NAME,iHD
#env = WLR_RENDERER,vulkan
#env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
#env = CLUTTER_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# -----------------------------------------------------
# AUTOSTART
# -----------------------------------------------------
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/pam_kwallet_init
exec-once = qs -c noctalia-shell
#exec-once = $scriptsDir/Polkit.sh
exec-once = $scriptsDir/PortalHyprland.sh

# -----------------------------------------------------
# APPEARANCE
# -----------------------------------------------------
general {
  gaps_in = 2
  gaps_out = 5
  resize_on_border = true
}

decoration {
  rounding = 10
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }
}

animations {
    enabled = true
    bezier = natural, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 3.5, natural, popin 85%
    animation = windowsOut, 1, 3, natural, popin 85%
    animation = windowsMove, 1, 3.5, natural
    animation = fade, 1, 2.5, natural
    animation = workspaces, 1, 4, natural, slidefade 20%
    animation = specialWorkspace, 1, 4, natural, fade
    animation = border, 1, 3, natural
    animation = layers, 1, 3.5, natural, fade
    animation = layersOut, 1, 2.5, natural, fade
}

# -----------------------------------------------------
# LAYOUT SETTINGS
# -----------------------------------------------------
scrolling {
    fullscreen_on_one_column = true
    column_width = 0.9
    direction = right
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# -----------------------------------------------------
# MISC & INPUT
# -----------------------------------------------------
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 2
    mouse_move_enables_dpms = true
    focus_on_activate = false
    initial_workspace_tracking = 0
    middle_click_paste = true
    enable_anr_dialog = true
    allow_session_lock_restore = true
}

binds {
    pass_mouse_when_bound = false
}

cursor {
    sync_gsettings_theme = true
    enable_hyprcursor = true
    inactive_timeout = 3
    hide_on_key_press = true
    no_warps = true
}

input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    repeat_rate = 50
    repeat_delay = 300
    sensitivity = -0.4
    accel_profile = flat
    numlock_by_default = true
    left_handed = false
    follow_mouse = 1
    float_switch_override_focus = false

    touchpad {
        natural_scroll = false
    }
}

# -----------------------------------------------------
# KEYBINDINGS
# -----------------------------------------------------

# 1. APPLICATIONS
bind = $mainMod,        Return, exec, $term #"Terminal"
bind = $mainMod,        E,      exec, $fileManager #"File Manager"
bind = $mainMod,        B,      exec, $browser #"Browser"
bind = $mainMod SHIFT,  B,      exec, $browser-two #"Secondary Browser"
bind = $mainMod,        Q,      killactive #"Close window"
bind = $mainMod SHIFT,  Q,      exec, $scriptsDir/KillActiveProcess.sh #"Kill Process"
bind = $mainMod,        L,      exec, $ipc lockScreen lock #"Lock screen"
bind = $mainMod SHIFT,  C,      exec, hyprpicker -a #"Color picker"

# 2. NOCTALIA SHELL
bind = $mainMod,        D,      exec, $ipc launcher toggle                       #"Launcher"
bind = $mainMod,        S,      exec, $ipc controlCenter toggle                  #"Control Center"
bind = $mainMod,        comma,  exec, $ipc settings toggle                       #"Configurações"
bind = $mainMod,        v,      exec, $ipc plugin:clipper toggle                 #"Clipboard history"
bind = $mainMod,        period, exec, $ipc launcher emoji                        #"Emoji picker"
bind = $mainMod CTRL,   W,      exec, $ipc wallpaper toggle                      #"Wallpaper picker"
bind = $mainMod CTRL,   X,      exec, $ipc sessionMenu toggle                    #"Session menu"
bind = $mainMod SHIFT,  N,      exec, $ipc plugin togglePanel notes-scratchpad   #"Notes scratchpad"
bind = $mainMod,        F1,     exec, $ipc plugin:keybind-cheatsheet toggle      #"Cheatsheet atalhos"
bind = $mainMod,        A,                exec, $ipc plugin:workspace-overview toggle      #"workspace-overview"
bind = $mainMod SHIFT,  S,      exec, $ipc plugin:screen-toolkit toggle          #"Screen toolkit"

# 3. CUSTOM MENU ROFI
bind = $mainMod  SHIFT,  E,     exec, $HOME/.config/rofi/custom_menu.sh #"Quick menu"

# 4. WINDOW MANAGEMENT
bind = $mainMod,       SPACE, togglefloating #"Toggle floating"
bind = $mainMod,       C,     centerwindow #"Center window"
bind = $mainMod,       P,     pin #"Pin window"
bind = $mainMod,       F,     fullscreen, 0 #"Fullscreen"
bind = $mainMod,       M,     fullscreen, 1 #"Maximize"
bind = $mainMod CTRL,  F,     fullscreenstate, 0 2 #"Fake fullscreen"
bind = $mainMod CTRL,  L,     exec, $scriptsDir/CycleLayout.sh #"Cycle layout"
bind = $mainMod,       J,     layoutmsg, togglesplit #"Toggle split"

# 5. FOCUS & MOVEMENT
bind = $mainMod,       left,  movefocus, l #"Focus left"
bind = $mainMod,       right, movefocus, r #"Focus right"
bind = $mainMod,       up,    movefocus, u #"Focus up"
bind = $mainMod,       down,  movefocus, d #"Focus down"

bind = $mainMod SHIFT, left,  movewindow, l #"Move window left"
bind = $mainMod SHIFT, right, movewindow, r #"Move window right"
bind = $mainMod SHIFT, up,    movewindow, u #"Move window up"
bind = $mainMod SHIFT, down,  movewindow, d #"Move window down"

bind = $mainMod CTRL,  left,  resizeactive, -40 0 #"Resize left"
bind = $mainMod CTRL,  right, resizeactive, 40 0 #"Resize right"
bind = $mainMod CTRL,  up,    resizeactive, 0 -40 #"Resize up"
bind = $mainMod CTRL,  down,  resizeactive, 0 40 #"Resize down"

bindm = $mainMod, mouse:272, movewindow #"Move window (Mouse)"
bindm = $mainMod, mouse:273, resizewindow #"Resize window (Mouse)"

# 6. GROUPS
bind = $mainMod,       G,   togglegroup #"Toggle group"
bind = $mainMod,       Tab, changegroupactive, f #"Next in group"
bind = $mainMod SHIFT, Tab, changegroupactive, b #"Prev in group"
bind = $mainMod SHIFT, G,   moveoutofgroup #"Move out of group"
bind = $mainMod CTRL,  G,   lockactivegroup, toggle #"Lock group"

# 7. SCRATCHPADS
bind = $mainMod, T, togglespecialworkspace, term #"Terminal scratchpad"

# 8. SCREENSHOTS & RECORD
bind = $mainMod,            Print, exec, $ipc plugin:screen-shot-and-record screenshot  #"Screenshot"
bind = $mainMod SHIFT,      Print, exec, $ipc plugin:screen-shot-and-record ocr          #"OCR (copia texto)"
bind = ALT,                 Print, exec, $ipc plugin:screen-shot-and-record search       #"Google Lens"
bind = $mainMod CTRL,       Print, exec, $ipc plugin:screen-shot-and-record record       #"Gravar tela"
bind = $mainMod ALT,        Print, exec, $ipc plugin:screen-shot-and-record recordsound  #"Gravar com áudio"

# 9. MEDIA & HARDWARE
bindel = , XF86AudioRaiseVolume,  exec, $ipc volume increase           #"Volume up"
bindel = , XF86AudioLowerVolume,  exec, $ipc volume decrease           #"Volume down"
bindl  = , XF86AudioMute,         exec, $ipc volume muteOutput         #"Mute audio"
bind   = $mainMod, XF86AudioMute, exec, $ipc volume muteInput          #"Mute mic"
bindel = , XF86MonBrightnessUp,   exec, $ipc brightness increase       #"Brightness up"
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease       #"Brightness down"
bindl  = , XF86AudioNext,         exec, $ipc media next                #"Next track"
bindl  = , XF86AudioPause,        exec, $ipc media playPause           #"Play/Pause"
bindl  = , XF86AudioPlay,         exec, $ipc media playPause           #"Play/Pause"
bindl  = , XF86AudioPrev,         exec, $ipc media previous            #"Prev track"

# 10. WORKSPACES
bind = $mainMod, 1, workspace, 1 #"Workspace 1"
bind = $mainMod, 2, workspace, 2 #"Workspace 2"
bind = $mainMod, 3, workspace, 3 #"Workspace 3"
bind = $mainMod, 4, workspace, 4 #"Workspace 4"
bind = $mainMod, 5, workspace, 5 #"Workspace 5"
bind = $mainMod, 6, workspace, 6 #"Workspace 6"
bind = $mainMod, 7, workspace, 7 #"Workspace 7"
bind = $mainMod, 8, workspace, 8 #"Workspace 8"
bind = $mainMod, 9, workspace, 9 #"Workspace 9"
bind = $mainMod, 0, workspace, 10 #"Workspace 10"
bind = $mainMod, ESCAPE, workspace, previous #"Previous workspace"

bind = $mainMod SHIFT, 1, movetoworkspace, 1 #"Move to Workspace 1"
bind = $mainMod SHIFT, 2, movetoworkspace, 2 #"Move to Workspace 2"
bind = $mainMod SHIFT, 3, movetoworkspace, 3 #"Move to Workspace 3"
bind = $mainMod SHIFT, 4, movetoworkspace, 4 #"Move to Workspace 4"
bind = $mainMod SHIFT, 5, movetoworkspace, 5 #"Move to Workspace 5"
bind = $mainMod SHIFT, 6, movetoworkspace, 6 #"Move to Workspace 6"
bind = $mainMod SHIFT, 7, movetoworkspace, 7 #"Move to Workspace 7"
bind = $mainMod SHIFT, 8, movetoworkspace, 8 #"Move to Workspace 8"
bind = $mainMod SHIFT, 9, movetoworkspace, 9 #"Move to Workspace 9"
bind = $mainMod SHIFT, 0, movetoworkspace, 10 #"Move to Workspace 10"

bind = $mainMod CTRL, 1, movetoworkspacesilent, 1 #"Move silently to Workspace 1"
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2 #"Move silently to Workspace 2"
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3 #"Move silently to Workspace 3"
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4 #"Move silently to Workspace 4"
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5 #"Move silently to Workspace 5"
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6 #"Move silently to Workspace 6"
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7 #"Move silently to Workspace 7"
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8 #"Move silently to Workspace 8"
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9 #"Move silently to Workspace 9"
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10 #"Move silently to Workspace 10"

bind = $mainMod,       MINUS, togglespecialworkspace, magic #"Magic scratchpad"
bind = $mainMod SHIFT, MINUS, movetoworkspace, special:magic #"Move to magic scratchpad"
bind = $mainMod CTRL,  MINUS, movetoworkspace, e+0 #"Move to empty workspace"

bind = $mainMod, mouse_up,   workspace, m+1 #"Next workspace (Mouse)"
bind = $mainMod, mouse_down, workspace, m-1 #"Prev workspace (Mouse)"

# workspace persistent
workspace = 1, monitor:eDP-1, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true
workspace = 4, monitor:eDP-1, persistent:true
workspace = 5, monitor:eDP-1, persistent:true
workspace = 6, monitor:eDP-1, persistent:true
workspace = 7, monitor:eDP-1, persistent:true
workspace = 8, monitor:eDP-1, persistent:true
workspace = 9, monitor:eDP-1, persistent:true
#workspace = 10, monitor:eDP-1, persistent:true

# -----------------------------------------------------
# WORKSPACE RULES
# -----------------------------------------------------
workspace = special:term, on-created-empty:[float; size 1280 720] $term --class kitty-scratchpad, persistent:false
workspace = special:magic, persistent:false

# -----------------------------------------------------
# WINDOW RULES 
# -----------------------------------------------------

windowrule = float on, match:class ^(steam_app_.*)$, match:initial_title ^(..+)$

windowrule {
    name = agent_polkit
    match:class = ^(polkit-gnome-authentication-agent-1)$
    float = 1
    center = 1
    pin = 1
}

windowrule {
    name = utils_center
    match:class = ^(nm-connection-editor|blueman-manager)$
    float = 1
    center = 1
}

windowrule {
    name = pavucontrol
    match:class = ^(pavucontrol)$
    float = 1
    center = 1
    size = 700 450
}

windowrule {
    name = dialogs
    match:title = ^(Open File|Save As|File Upload)$
    float = 1
    center = 1
}

windowrule {
    name = thunar_progress
    match:class = ^(thunar)$
    match:title = ^(File Operation Progress)$
    float = 1
    center = 1
    size = 26% 18%
}

windowrule {
    name = discord_popouts
    match:class = ^(vesktop)$
    match:title = ^(Discord Popout)$
    float = 1
    center = 1
}

windowrule {
    name = firefox_sharing
    match:class = ^(firefox)$
    match:title = ^(Firefox — Sharing Indicator)$
    float = 1
}

windowrule {
    name = app_opacity
    match:class = ^(kitty|Spotify|steam)$
    #opacity = 0.9 0.8
}

windowrule {
    name = pip_video
    match:title = ^(Picture-in-Picture)$
    float = 1
    pin = 1
    opacity = 0.95 0.75
    size = 25% 25%
    move = 72% 7%
    keep_aspect_ratio = 1
}

windowrule {
    name = tearing_games
    match:class = ^(steam_app_.*)$
    immediate = 1
}

# -----------------------------------------------------
# LAYER RULES
# -----------------------------------------------------

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

layerrule = match:namespace noctalia-shell:regionSelector, no_anim on

source = /home/gsouza/.config/hypr/noctalia/noctalia-colors.conf
